name: Build, Push, and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  APP_NAME: myapp
  CONTAINER_NAME: myapp
  CONTAINER_PORT: "5000"
  HOST_PORT: "80"
  SSM_PARAMETER_PATH: ${{ secrets.SSM_PARAMETER_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$ECR_REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Pack env fetch script
        id: pack-script
        run: |
          echo "fetch_env_b64=$(base64 -w 0 scripts/fetch-env.sh)" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 through SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
          ECR_REGISTRY: ${{ steps.build-image.outputs.ecr_registry }}
          FETCH_ENV_B64: ${{ steps.pack-script.outputs.fetch_env_b64 }}
        run: |
          COMMANDS=$(cat <<EOF
          [
            "set -e",
            "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
            "mkdir -p /opt/${APP_NAME}/scripts",
            "printf '%s' '${FETCH_ENV_B64}' | base64 -d > /opt/${APP_NAME}/scripts/fetch-env.sh",
            "chmod +x /opt/${APP_NAME}/scripts/fetch-env.sh",
            "PARAMETER_PATH='${SSM_PARAMETER_PATH}' ENV_FILE='/opt/${APP_NAME}/.env' /opt/${APP_NAME}/scripts/fetch-env.sh",
            "docker pull ${IMAGE_URI}",
            "docker stop ${CONTAINER_NAME} || true",
            "docker rm ${CONTAINER_NAME} || true",
            "docker run -d --name ${CONTAINER_NAME} --restart unless-stopped --env-file /opt/${APP_NAME}/.env -p ${HOST_PORT}:${CONTAINER_PORT} ${IMAGE_URI}",
            "docker image prune -f"
          ]
          EOF
          )

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${APP_NAME}" \
            --parameters "commands=$COMMANDS" \
            --region "$AWS_REGION" \
            --output text
